<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Public Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 420px;
      height: 620px;
      background: #16213e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .chat-header {
      background: #0f3460;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-info h2 {
      color: #fff;
      font-size: 16px;
    }

    .header-info span {
      color: #4ecca3;
      font-size: 12px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.received {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .sent .bubble {
      background: #e94560;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .received .bubble {
      background: #0f3460;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
      padding: 0 4px;
    }

    .date-divider {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin: 4px 0;
      position: relative;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: #2a2a4a;
    }

    .date-divider::before { left: 0; }
    .date-divider::after  { right: 0; }

    .chat-input {
      padding: 14px 16px;
      background: #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      background: #16213e;
      border: 1px solid #1a3a6e;
      border-radius: 24px;
      padding: 10px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input input:focus {
      border-color: #e94560;
    }

    .chat-input input::placeholder {
      color: #555;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #e94560;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover  { background: #c73652; }
    .send-btn:active { transform: scale(0.93); }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .username-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .username-box {
      background: #16213e;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    .username-box h3 {
      color: #fff;
      margin-bottom: 12px;
    }

    .username-box input {
      width: 100%;
      padding: 10px;
      border: 1px solid #1a3a6e;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      margin-bottom: 12px;
    }

    .username-box button {
      width: 100%;
      padding: 10px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .username-box button:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

<div id="usernameModal" class="username-modal">
  <div class="username-box">
    <h3>Enter Your Name</h3>
    <input type="text" id="usernameInput" placeholder="Your name..." />
    <button id="setUsernameBtn">Join Chat</button>
  </div>
</div>

<div class="chat-container">

  <div class="chat-header">
    <div class="avatar" id="userAvatar">A</div>
    <div class="header-info">
      <h2 id="userName">Anonymous</h2>
      <span>● Online</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="date-divider">Today</div>
  </div>

  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button class="send-btn" id="sendBtn" title="Send">
